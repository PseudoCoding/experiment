name: Daily AI Theme Update

on:
  # Run every day at 08:00 UTC
  schedule:
    - cron: '0 8 * * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-theme:
    name: Generate new theme with GitHub Models
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a PAT if you want the push to trigger downstream workflows (e.g. Cloudflare Pages)
          # Otherwise GITHUB_TOKEN is sufficient for the commit itself.
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Install deps ─────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Run AI theme update ──────────────────────────────────────────────────
      - name: Update theme.json via GitHub Models API
        env:
          # GITHUB_TOKEN automatically has models:read permission when Copilot is enabled
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-theme.js

      # ── Check for changes ────────────────────────────────────────────────────
      - name: Check if theme changed
        id: changes
        run: |
          git diff --quiet src/theme.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      # ── Commit & push ────────────────────────────────────────────────────────
      - name: Commit updated theme
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          DATE=$(date -u '+%Y-%m-%d')
          git add src/theme.json
          git commit -m "chore(theme): AI aesthetic update for ${DATE}

          Daily theme refresh generated by GitHub Copilot (GitHub Models API).
          Colors and aesthetic style updated based on current design trends.
          
          [skip ci if Cloudflare auto-deploys on push]"
          git push

      # ── No-op log ────────────────────────────────────────────────────────────
      - name: Log if no changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "Theme was unchanged by the AI response. No commit needed."
